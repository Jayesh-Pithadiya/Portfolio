<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jayesh Pithadiya | Admin Panel</title>
    <link rel="stylesheet" href="/admin/style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Admin Panel</h1>
            <p class="subtitle">Securely managing portfolio data and configurations.</p>
        </header>

        <section class="controls">
            <button id="loadBtn">Fetch Private Data</button>
            <button id="clearBtn" class="secondary">Clear View</button>
        </section>

        <section class="output-container">
            <div class="output-header">
                <span><span class="status-dot"></span>data.json</span>
                <span id="timestamp">No data loaded</span>
            </div>
            <pre id="output">// Data will appear here...</pre>
        </section>
    </div>

    <script src="/admin/script.js"></script>
</body>

</html>
